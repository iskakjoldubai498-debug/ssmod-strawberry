{% extends 'shop/base.html' %}
{% load static %}

{% block title %}SSMOD | Байланыш{% endblock %}

{% block content %}
<style>
    .contact-wrapper {
        max-width: 1200px;
        margin: 0 auto;
        padding: 40px 20px;
    }

    .contact-grid {
        display: grid;
        grid-template-columns: 1fr 1.2fr;
        gap: 60px;
        align-items: center;
        min-height: 70vh;
    }

    .contact-content h1 {
        font-family: 'Playfair Display', serif;
        font-size: 4rem;
        margin-bottom: 10px;
        letter-spacing: -2px;
    }

    .contact-content p {
        font-size: 1.1rem;
        opacity: 0.5;
        margin-bottom: 50px;
    }

    /* СОЦИАЛДЫК ТАРМАКТАР */
    .social-stack {
        display: flex;
        flex-direction: column;
        gap: 12px;
    }

    .social-card {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 22px 30px;
        background: var(--glass);
        border: 1px solid var(--border);
        border-radius: 100px;
        text-decoration: none;
        color: var(--text);
        transition: 0.5s cubic-bezier(0.2, 1, 0.3, 1);
    }

    .social-card:hover {
        background: var(--text);
        color: var(--bg);
        transform: scale(1.02);
    }

    .brand-info {
        display: flex;
        align-items: center;
        gap: 15px;
    }

    .brand-info img {
        width: 28px;
        height: 28px;
    }

    .brand-name {
        font-weight: 600;
        letter-spacing: 1px;
        text-transform: uppercase;
        font-size: 0.85rem;
    }

    .arrow-icon { font-size: 1.2rem; opacity: 0.5; }

    /* КАРТА */
    .map-box {
        position: relative;
        height: 500px;
        border-radius: 40px;
        overflow: hidden;
        border: 1px solid var(--border);
    }

    .loc-tag {
        position: absolute;
        top: 30px;
        right: 30px;
        background: var(--glass);
        backdrop-filter: blur(10px);
        padding: 12px 25px;
        border-radius: 50px;
        font-size: 0.8rem;
        font-weight: 600;
        border: 1px solid var(--border);
        z-index: 10;
    }

    @media (max-width: 900px) {
        .contact-grid { grid-template-columns: 1fr; text-align: center; }
        .contact-content h1 { font-size: 3rem; }
        .social-card { padding: 18px 25px; }
        .map-box { height: 350px; }
    }
</style>

<div class="contact-wrapper">
    <div class="contact-grid">
        
        <div class="contact-content" data-aos="fade-up">
            <h1>Байланыш.</h1>
            <p>Биз менен бир тийүү аркылуу байланышыңыз.</p>
            
            <div class="social-stack">
                <a href="https://wa.me/996704034209" class="social-card">
                    <div class="brand-info">
                        <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="WA">
                        <span class="brand-name">WhatsApp</span>
                    </div>
                    <span class="arrow-icon">↗</span>
                </a>

                <a href="https://instagram.com/osh.ssmod" class="social-card">
                    <div class="brand-info">
                        <img src="https://upload.wikimedia.org/wikipedia/commons/e/e7/Instagram_logo_2016.svg" alt="IG">
                        <span class="brand-name">Instagram</span>
                    </div>
                    <span class="arrow-icon">↗</span>
                </a>

                <a href="https://t.me/+996704034209" class="social-card">
                    <div class="brand-info">
                        <img src="https://upload.wikimedia.org/wikipedia/commons/8/82/Telegram_logo.svg" alt="TG">
                        <span class="brand-name">Telegram</span>
                    </div>
                    <span class="arrow-icon">↗</span>
                </a>
            </div>
        </div>

        <div class="map-box" data-aos="fade-up" data-aos-delay="200">
            <div class="loc-tag">📍 Салиева 62, Ош</div>
            <iframe 
                src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3039.6105847668406!2d72.82136!3d40.53128!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x38bdad0303030303%3A0x0!2zNDDCsDMxJzUyLjYiTiA3MsKwNDknMTYuOSJF!5e0!3m2!1sky!2skg!4v1700000000000" 
                width="100%" height="100%" style="border:0;" allowfullscreen="" loading="lazy">
            </iframe>
        </div>

    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.js"></script>
<script>AOS.init({ duration: 1000, once: true });</script>

{% endblock %}
