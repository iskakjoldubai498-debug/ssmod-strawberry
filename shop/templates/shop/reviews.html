{% extends 'shop/base.html' %}
{% block content %}
<div style="text-align: center; padding: 50px 0;">
    <h1 style="font-family: 'Playfair Display', serif; color: #ff4d6d;">Кардарлардын пикири</h1>
    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; margin-top: 40px;">
        <div style="background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05);">
            <p style="font-style: italic;">"Ошто мындай сапатты биринчи жолу көрүшүм. Кулпунайлар абдан таттуу, таңгактоосуна сөз жок!"</p>
            <h4 style="color: #ff4d6d; margin-top: 15px;">— Айсулуу</h4>
        </div>
        <div style="background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05);">
            <p style="font-style: italic;">"24/7 иштегени абдан ыңгайлуу экен. Түнкү саат 2де заказ бердик, 40 мүнөттө алып келишти."</p>
            <h4 style="color: #ff4d6d; margin-top: 15px;">— Бексултан</h4>
        </div>
    </div>
</div>
{% endblock %}
