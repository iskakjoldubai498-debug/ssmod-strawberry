{% load static %}
<!DOCTYPE html>
<html lang="ky">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}SSMOD | Luxury Desserts{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #ff4d6d;
            --bg: #f8f8f8;
            --text: #1a1a1a;
            --border: rgba(0,0,0,0.08);
            --glass: rgba(255,255,255,0.65);
            --toggle-bg: #e0e0e0;
            --nav-bg: rgba(255,255,255,0.85);
        }
        [data-theme="dark"] {
            --bg: #0d0d0d;
            --text: #ffffff;
            --border: rgba(255,255,255,0.12);
            --glass: rgba(20,20,20,0.72);
            --toggle-bg: #2a2a2a;
            --nav-bg: rgba(15,15,15,0.92);
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family:'Montserrat',sans-serif;
            background:var(--bg);
            color:var(--text);
            transition: none;
            overflow-x:hidden;
        }
        header {
            padding:15px 5%; display:flex; justify-content:space-between; align-items:center;
            position:sticky; top:0; z-index:1000;
            background:var(--glass); backdrop-filter:blur(15px);
            border-bottom:1px solid var(--border);
        }
        .logo { font-family:'Playfair Display',serif; font-size:1.5rem; font-weight:700; text-decoration:none; color:var(--text); }
        .logo span { color:var(--accent); }
        .controls { display:flex; align-items:center; gap:15px; }
        .theme-switch {
            width: 34px;
            height: 34px;
            background: transparent;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            backdrop-filter: none;
            -webkit-backdrop-filter: none;
            box-shadow: none;
            transition: none;
        }
        .switch-dot {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: linear-gradient(145deg, #ff9fb0, #ff4d6d);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            box-shadow: 0 6px 18px rgba(255,77,109,0.45), inset 0 1px 2px rgba(255,255,255,0.3);
            transition: none;
        }
        [data-theme="dark"] .switch-dot {
            transform: none;
            background: linear-gradient(145deg, #7c5cff, #3b2bff);
            box-shadow: 0 6px 18px rgba(80,60,255,0.5);
        }
        .menu-btn {
            cursor:pointer; padding:8px 15px; border:1px solid var(--text);
            border-radius:50px; font-weight:600; font-size:.8rem;
        }

        /* FAB triangle menu */
        .fab-wrap { position:fixed; right:30px; bottom:30px; z-index:2600; }
        .fab-main {
            width:64px; height:64px; border:none; border-radius:50%; cursor:pointer;
            background: rgba(255, 77, 109, 0.25);
            backdrop-filter: blur(15px) saturate(180%);
            -webkit-backdrop-filter: blur(15px) saturate(180%);
            box-shadow: 0 12px 30px rgba(255,77,109,.35), 0 6px 20px rgba(255,77,109,.25) inset;
            font-size:28px;
            color:#fff;
            position:relative;
            overflow:hidden;
            transition: all 0.4s ease;
        }
        /* triangle effect */
        .fab-main::before {
            content:'';
            position:absolute;
            width:120%;
            height:120%;
            top:-10%;
            left:-10%;
            background: linear-gradient(145deg, rgba(255,255,255,0.2), rgba(255,255,255,0));
            clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
            animation: rotateTriangle 6s linear infinite;
        }
        @keyframes rotateTriangle {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .fab-main:hover {
            background: rgba(255, 77, 109, 0.35);
            box-shadow: 0 16px 40px rgba(255,77,109,.45), 0 8px 25px rgba(255,77,109,.35) inset;
            transform: scale(1.1) rotate(5deg);
        }

        .fab-actions {
            position:absolute; right:0; bottom:80px; display:flex; flex-direction:column; gap:14px;
            opacity:0; pointer-events:none; transition:.3s ease;
        }
        .fab-wrap.active .fab-actions { opacity:1; pointer-events:auto; }
        .fab-action {
            width:56px; height:56px; border:none; border-radius:18px; cursor:pointer;
            background:var(--glass); color:var(--text); font-size:22px;
            backdrop-filter:blur(15px); box-shadow:0 10px 25px rgba(0,0,0,.15);
        }

        .chat-window {
            position:fixed; bottom:110px; right:30px; width:350px; height:500px;
            background:var(--glass); backdrop-filter:blur(20px);
            border:1px solid var(--border); border-radius:25px; display:none;
            flex-direction:column; z-index:2501; overflow:hidden;
        }
        .chat-window.active { display:flex; }
        .chat-header { padding:20px; background:var(--accent); color:white; display:flex; justify-content:space-between; }
        .chat-messages { flex:1; overflow-y:auto; padding:20px; display:flex; flex-direction:column; gap:12px; }
        .msg { max-width:85%; padding:10px 15px; border-radius:18px; font-size:.9rem; }
        .msg.bot { background:rgba(150,150,150,.1); align-self:flex-start; }
        .msg.user { background:var(--accent); color:white; align-self:flex-end; }
        .chat-footer { padding:15px; display:flex; gap:10px; border-top:1px solid var(--border); }
        .chat-footer input { flex:1; padding:10px 15px; border-radius:20px; border:1px solid var(--border); }
        .chat-footer button { width:40px; height:40px; border:none; border-radius:50%; background:var(--accent); color:white; }

        .modal-overlay {
            display:none; position:fixed; inset:0; background:rgba(0,0,0,.4);
            backdrop-filter:blur(12px); z-index:3000; align-items:center; justify-content:center;
        }
        .modal-overlay.active { display:flex; }
        .modal-content {
            background:var(--glass); padding:40px; border-radius:30px; width:90%; max-width:420px; position:relative;
        }
        .close-modal { position:absolute; top:20px; right:25px; cursor:pointer; }
        .modal-content input, .modal-content textarea {
            width:100%; padding:15px; margin-bottom:15px; border-radius:12px; border:1px solid var(--border);
            background:rgba(255,255,255,.1); color:var(--text);
        }
        .modal-content button { width:100%; padding:18px; border:none; border-radius:12px; background:var(--accent); color:white; }

        nav {
            position:fixed; top:0; right:-100%; width:280px; height:100vh; z-index:2000;
            background:var(--nav-bg); backdrop-filter:blur(20px); padding:60px 40px; transition:.4s;
        }
        nav.active { right:0; }
        nav ul { list-style:none; margin-top:40px; }
        nav li { margin-bottom:25px; }
        nav a { text-decoration:none; color:var(--text); }
    </style>
</head>
<body id="body">
    <header>
        <a href="/" class="logo">SS<span>mod.</span></a>
        <div class="controls">
            <div class="theme-switch" id="themeToggle">
                <div class="switch-dot" id="switchDot">☀️</div>
            </div>
            <div class="menu-btn" id="menuOpen">MENU</div>
        </div>
    </header>

    <div class="fab-wrap" id="fabWrap">
        <div class="fab-actions">
            <button class="fab-action" id="openModal">🛍️</button>
            <button class="fab-action" id="chatBtn">🍓</button>
        </div>
        <button class="fab-main" id="fabMain">◢</button>
    </div>

    <div class="chat-window" id="chatWin">
        <div class="chat-header"><span>SSMOD AI Жардамчы</span><span id="closeChat">✕</span></div>
        <div class="chat-messages" id="chatMsgs">
            <div class="msg bot">Салам! Мен SSMOD жардамчысымын 🍓</div>
        </div>
        <div class="chat-footer">
            <input type="text" id="chatInput" placeholder="Жазыңыз...">
            <button id="sendBtn">➤</button>
        </div>
    </div>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-content">
            <span class="close-modal" id="closeModal">✕</span>
            <h3 style="text-align:center; margin-bottom:25px;">Заказ берүү</h3>
            <form id="orderForm" method="POST">
                {% csrf_token %}
                <input type="text" name="userName" placeholder="Атыңыз" required>
                <input type="tel" name="userPhone" placeholder="Телефон" required>
                <textarea name="userMsg" rows="3" placeholder="Кандай десерт каалайсыз?"></textarea>
                <button type="submit" id="submitBtn">ЖӨНӨТҮҮ</button>
                <div id="responseMsg" style="display:none; text-align:center; margin-top:15px;"></div>
            </form>
        </div>
    </div>

    <nav id="sideNav">
        <div id="menuClose">✕ ЖАБУУ</div>
        <ul>
            <li><a href="{% url 'home' %}">Башкы бет</a></li>
            <li><a href="{% url 'about' %}">Биз жөнүндө</a></li>
            <li><a href="{% url 'price' %}">Баалар</a></li>
            <li><a href="{% url 'contact' %}">Байланыш</a></li>
        </ul>
    </nav>

    <main>{% block content %}{% endblock %}</main>

    <script>
        const body = document.getElementById('body');
        const savedTheme = localStorage.getItem('theme');
        const systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        const startDark = savedTheme ? savedTheme === 'dark' : systemDark;
        if (startDark) body.setAttribute('data-theme', 'dark');

        const switchDot = document.getElementById('switchDot');
        if (body.getAttribute('data-theme') === 'dark') switchDot.innerText = '🌙';
        document.getElementById('themeToggle').onclick = () => {
            const dark = body.getAttribute('data-theme') === 'dark';
            if (dark) {
                body.removeAttribute('data-theme');
                switchDot.innerText = '☀️';
                localStorage.setItem('theme', 'light');
            } else {
                body.setAttribute('data-theme', 'dark');
                switchDot.innerText = '🌙';
                localStorage.setItem('theme', 'dark');
            }
        };

        const fabWrap = document.getElementById('fabWrap');
        document.getElementById('fabMain').onclick = () => fabWrap.classList.toggle('active');

        const modal = document.getElementById('modalOverlay');
        const sideNav = document.getElementById('sideNav');
        const chatWin = document.getElementById('chatWin');

        document.getElementById('openModal').onclick = () => {
            modal.classList.add('active');
            fabWrap.classList.remove('active');
        };
        document.getElementById('closeModal').onclick = () => modal.classList.remove('active');
        document.getElementById('chatBtn').onclick = () => {
            chatWin.classList.toggle('active');
            fabWrap.classList.remove('active');
        };
        document.getElementById('closeChat').onclick = () => chatWin.classList.remove('active');
        document.getElementById('menuOpen').onclick = () => sideNav.classList.add('active');
        document.getElementById('menuClose').onclick = () => sideNav.classList.remove('active');

        async function handleChat() {
            const input = document.getElementById('chatInput');
            const text = input.value.trim();
            if (!text) return;
            const msgs = document.getElementById('chatMsgs');
            msgs.innerHTML += `<div class="msg user">${text}</div>`;
            input.value = '';
            const res = await fetch(`/strawberry-chat/?message=${encodeURIComponent(text)}`);
            const data = await res.json();
            msgs.innerHTML += `<div class="msg bot">${data.reply}</div>`;
            msgs.scrollTop = msgs.scrollHeight;
        }
        document.getElementById('sendBtn').onclick = handleChat;
        document.getElementById('chatInput').onkeypress = e => { if (e.key === 'Enter') handleChat(); };

        document.getElementById('orderForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const resp = document.getElementById('responseMsg');
            btn.disabled = true;
            const formData = new FormData(e.target);
            const response = await fetch("{% url 'home' %}", {
                method: 'POST',
                body: formData,
                headers: { 'X-CSRFToken': document.querySelector('[name=csrfmiddlewaretoken]').value }
            });
            if (response.ok) {
                resp.innerText = 'Заказ кабыл алынды! ✨';
                resp.style.display = 'block';
                e.target.reset();
                setTimeout(() => modal.classList.remove('active'), 2000);
            }
            btn.disabled = false;
        };
    </script>
</body>
</html>
