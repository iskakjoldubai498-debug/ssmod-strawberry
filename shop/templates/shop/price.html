{% extends 'shop/base.html' %}
{% load static %}

{% block content %}
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@200;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />

<style>
:root {
    --royal-gold: #d4af37;
    --gold-gradient: linear-gradient(135deg, #d4af37, #f1d37e, #d4af37);
}

/* WRAPPER */
.showcase-wrapper {
    max-width: 1400px;
    margin: auto;
    padding: 100px 20px;
    font-family: 'Montserrat', sans-serif;

    /* ✅ ТЕКСТ ДАЙЫМА АК */
    color: #ffffff;
}

/* HEADER */
.showcase-header {
    text-align: center;
    margin-bottom: 100px;
}

.showcase-header h1 {
    font-family: 'Cinzel', serif;
    font-size: clamp(2.5rem, 8vw, 5rem);
    letter-spacing: 12px;
    background: linear-gradient(120deg, #d4af37, #fff2b0, #d4af37);
    background-size: 200% auto;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: shine 5s linear infinite;
}

@keyframes shine {
    to { background-position: 200% center; }
}

/* GRID */
.royal-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
    gap: 40px;
}

/* CARD */
.royal-card {
    position: relative;
    height: 520px;
    border-radius: 40px;
    overflow: hidden;
    background: transparent;
    cursor: pointer;
    transition: 0.6s;
}

.royal-card:hover {
    transform: scale(1.03);
}

/* MEDIA */
.card-video-wrap {
    position: absolute;
    width: 100%;
    height: 100%;
}

.card-video-wrap video,
.card-video-wrap img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* OVERLAY */
.card-overlay {
    position: absolute;
    width: 100%;
    height: 100%;
    padding: 30px;
    display: flex;
    align-items: flex-end;
    background: linear-gradient(to top, rgba(0,0,0,0.85), transparent);
}

/* CONTENT */
.card-content {
    transform: translateY(40px);
    opacity: 0;
    transition: 0.6s;
    color: #ffffff;
}

.royal-card:hover .card-content {
    transform: translateY(0);
    opacity: 1;
}

.royal-tag {
    color: var(--royal-gold);
    font-size: 0.7rem;
    letter-spacing: 3px;
}

/* TITLE FIX */
.card-content h3 {
    font-family: 'Cinzel', serif;
    font-size: 1.8rem;
    margin: 10px 0;
    color: #ffffff;

    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
}

/* PRICE */
.royal-price {
    font-size: 2rem;
    margin-bottom: 15px;
    color: #ffffff;

    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

/* LIKE */
.royal-like {
    position: absolute;
    top: 20px;
    right: 20px;
    font-size: 1.4rem;
    color: #ffffff;
    cursor: pointer;
    z-index: 5;
}

/* ❤️ КЫЗЫЛ LIKE */
.royal-like.active {
    color: #ff2e63;
    transform: scale(1.2);
    text-shadow: 0 0 10px rgba(255, 46, 99, 0.7);
}

/* BUTTON */
.royal-btn {
    display: inline-block;
    background: var(--gold-gradient);
    color: #000;
    padding: 12px 25px;
    border-radius: 15px;
    text-decoration: none;
    font-size: 0.8rem;
}

/* MOBILE */
@media (max-width: 480px) {
    .royal-card { height: 450px; }
}
</style>

<div class="showcase-wrapper">

    <div class="showcase-header">
        <h1>Баалары</h1>
    </div>

    <div class="royal-grid">
        {% for set in sets %}
        <div class="royal-card">

            <div class="card-video-wrap">
                {% if set.video %}
                <video autoplay muted loop playsinline preload="auto" poster="{{ set.image.url }}">
                    <source src="{{ set.video.url }}" type="video/mp4">
                </video>
                {% else %}
                <img src="{{ set.image.url }}">
                {% endif %}
            </div>

            <div class="royal-like" onclick="toggleLike(this)">
                <i class="far fa-heart"></i>
            </div>

            <div class="card-overlay">
                <div class="card-content">
                    <span class="royal-tag">штук • {{ set.pieces }}</span>

                    <h3>{{ set.title }}</h3>

                    <div class="royal-price">{{ set.price }} сом</div>

                    <a href="https://wa.me/996704034209?text={{ set.whatsapp_msg|urlencode }}" class="royal-btn">
                        Брондоо
                    </a>
                </div>
            </div>

        </div>
        {% endfor %}
    </div>

</div>

<script>
document.addEventListener("DOMContentLoaded", () => {
    document.querySelectorAll("video").forEach(video => {
        video.muted = true;
        video.play().catch(() => {});
    });
});

function toggleLike(el) {
    el.classList.toggle('active');
    let icon = el.querySelector('i');
    icon.classList.toggle('fas');
    icon.classList.toggle('far');
}

document.querySelectorAll("video").forEach(v => {
    v.addEventListener("error", () => {
        v.style.display = "none";
    });
});
</script>

{% endblock %}
